<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELEN AI Studio</title>

<style>
body {background:#080b10;color:#fff;font-family:Arial;text-align:center;padding-top:100px}
.upload-zone{border:2px dashed #00b4ff;padding:40px;border-radius:20px;cursor:pointer}
img{width:100%;max-width:300px;margin-top:20px}
.hidden{display:none}
</style>
</head>

<body>

<h1>VELEN AI Studio</h1>

<div class="upload-zone" id="dropZone">
  <p>Click or Drop Image</p>
  <input type="file" id="fileInput" hidden>
</div>

<div id="processing" class="hidden">
  <p>Processing...</p>
</div>

<div id="result" class="hidden">
  <h3>Before</h3>
  <img id="imgBefore">
  <h3>After</h3>
  <img id="imgAfter">
</div>

<script>
const fileInput = document.getElementById("fileInput");
const dropZone = document.getElementById("dropZone");
const processing = document.getElementById("processing");
const result = document.getElementById("result");
const imgBefore = document.getElementById("imgBefore");
const imgAfter = document.getElementById("imgAfter");

dropZone.onclick = () => fileInput.click();

fileInput.onchange = () => handleFile(fileInput.files[0]);

dropZone.ondragover = e => e.preventDefault();
dropZone.ondrop = e => {
  e.preventDefault();
  handleFile(e.dataTransfer.files[0]);
};

async function handleFile(file){
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    const img = new Image();
    img.src = e.target.result;

    img.onload = async function(){

      // 🔥 تصغير الصورة (حل 413)
      const canvas = document.createElement("canvas");
      const maxWidth = 800;

      let width = img.width;
      let height = img.height;

      if(width > maxWidth){
        const scale = maxWidth / width;
        width = maxWidth;
        height = height * scale;
      }

      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);

      const compressed = canvas.toDataURL("image/jpeg", 0.7);

      dropZone.style.display = "none";
      processing.classList.remove("hidden");
      result.classList.add("hidden");

      try {
        const response = await fetch("/api/enhance", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image: compressed })
        });

        const data = await response.json();

        // 🔥 DEBUG
        console.log("API RESPONSE:", data);

        if (!data.output) {
          alert("AI failed");
          return;
        }

        imgBefore.src = compressed;
        imgAfter.src = data.output;

        processing.classList.add("hidden");
        result.classList.remove("hidden");

      } catch (err) {
        alert("Error");
        console.error("FRONT ERROR:", err);
      }
    };
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
