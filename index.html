<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELEN AI Studio</title>

<style>
body {background:#080b10;color:#fff;font-family:Arial;text-align:center;padding-top:100px}
.upload-zone{border:2px dashed #00b4ff;padding:40px;border-radius:20px;cursor:pointer}
img{width:100%;max-width:300px;margin-top:20px}
.hidden{display:none}
</style>
</head>

<body>

<h1>VELEN AI Studio</h1>

<div class="upload-zone" id="dropZone">
  <p>Click or Drop Image</p>
  <input type="file" id="fileInput" hidden>
</div>

<div id="processing" class="hidden">
  <p>Processing...</p>
</div>

<div id="result" class="hidden">
  <h3>Before</h3>
  <img id="imgBefore">
  <h3>After</h3>
  <img id="imgAfter">
</div>

<script>
const fileInput = document.getElementById("fileInput");
const dropZone = document.getElementById("dropZone");
const processing = document.getElementById("processing");
const result = document.getElementById("result");
const imgBefore = document.getElementById("imgBefore");
const imgAfter = document.getElementById("imgAfter");

dropZone.onclick = () => fileInput.click();

fileInput.onchange = () => handleFile(fileInput.files[0]);

dropZone.ondragover = e => e.preventDefault();
dropZone.ondrop = e => {
  e.preventDefault();
  handleFile(e.dataTransfer.files[0]);
};

async function handleFile(file){
  if(!file) return;

  const reader = new FileReader();

  reader.onload = async function(e){
    const src = e.target.result;

    dropZone.style.display = "none";
    processing.classList.remove("hidden");
    result.classList.add("hidden");

    try {
      const response = await fetch("/api/enhance", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ image: src })
      });

      const data = await response.json();

      if (!data.output) {
        alert("AI failed");
        console.log(data);
        return;
      }

      imgBefore.src = src;
      imgAfter.src = data.output;

      processing.classList.add("hidden");
      result.classList.remove("hidden");

    } catch (err) {
      alert("Error");
      console.error(err);
    }
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
